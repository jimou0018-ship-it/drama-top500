      return `<span class="${cls}">${v ?? ""}</span>`;
    }, className: "num" },

  { key: "新增播放量", label: "新增播放", className: "num", numeric: true },
  { key: "新增评论量", label: "新增评论", className: "num", numeric: true },
  { key: "新增转发量", label: "新增转发", className: "num", numeric: true },

];

const HIST_COLS = [
  { key: "查询日期", label: "日期" },

];

function fmtNum(n) {
  if (n == null || n === "") return "";
  if (typeof n !== "number") n = Number(n);
  if (isNaN(n)) return "";
  return n.toLocaleString("zh-CN");
}

// 渲染 summary（按平台顺序）
(function renderSummary() {
  const bar = document.getElementById("summaryBar");
  const ordered = PLATFORM_ORDER.filter(p => SUMMARY[p] !== undefined)
    .concat(Object.keys(SUMMARY).filter(p => !PLATFORM_ORDER.includes(p)));
  for (const plat of ordered) {

  }
})();

// 构造表格
class TableView {
  constructor(tableId, countId, statId, records, cols, filters, searchInputId, resetBtnId, exportBtnId, exportName) {
    this.table = document.getElementById(tableId);
    this.countEl = document.getElementById(countId);
    this.statEl = document.getElementById(statId);
    this.records = records;
    this.cols = cols;
    this.filters = filters;
    this.searchEl = document.getElementById(searchInputId);
    this.resetEl = document.getElementById(resetBtnId);
    this.exportEl = document.getElementById(exportBtnId);
    this.exportName = exportName;
    this.sortKey = null;
    this.sortDir = null; // "asc" | "desc"
    this._buildHeader();
    this._fillFilterOptions();
    this._bindEvents();
    this.render();
    this.countEl.textContent = `${records.length} 行`;
  }
  _buildHeader() {
    const tr = this.table.querySelector("thead tr");
    tr.innerHTML = "";
    for (const c of this.cols) {
      const th = document.createElement("th");
      th.textContent = c.label;
      const ind = document.createElement("span");
      ind.className = "sort-ind";
      th.appendChild(ind);
      th.dataset.key = c.key;
      th.addEventListener("click", () => this._toggleSort(c.key));
      tr.appendChild(th);
    }
  }
  _toggleSort(key) {
    if (this.sortKey === key) {
      this.sortDir = this.sortDir === "asc" ? "desc" : (this.sortDir === "desc" ? null : "asc");
      if (this.sortDir === null) this.sortKey = null;
    } else {
      this.sortKey = key;
      this.sortDir = "desc";
    }
    const ths = this.table.querySelectorAll("thead th");
    ths.forEach(th => {
      th.classList.remove("asc", "desc");
      if (th.dataset.key === this.sortKey && this.sortDir) th.classList.add(this.sortDir);
    });
    this.render();
  }
  _fillFilterOptions() {
    for (const f of this.filters) {
      const sel = document.getElementById(f.id);
      let vals = [...new Set(this.records.map(r => r[f.key]).filter(v => v != null && v !== ""))];
      if (f.key === "平台") {
        vals.sort((a, b) => (PLATFORM_RANK[a] ?? 999) - (PLATFORM_RANK[b] ?? 999));
      } else if (f.key === "查询日期") {
        vals.sort((a, b) => String(b).localeCompare(String(a))); // 日期倒序
      } else {
        vals.sort();
      }
      for (const v of vals) {
        const opt = document.createElement("option");
        opt.value = v; opt.textContent = v;
        sel.appendChild(opt);
      }
    }
  }
  _bindEvents() {
    for (const f of this.filters) {
      document.getElementById(f.id).addEventListener("change", () => this.render());
    }
    this.searchEl.addEventListener("input", () => this.render());
    this.resetEl.addEventListener("click", () => {
      for (const f of this.filters) document.getElementById(f.id).value = "";
      this.searchEl.value = "";
      this.sortKey = null; this.sortDir = null;
      this.table.querySelectorAll("thead th").forEach(th => th.classList.remove("asc", "desc"));
      this.render();
    });
    this.exportEl.addEventListener("click", () => this.exportExcel());
  }
  _currentRows() {
    const filterVals = {};
    for (const f of this.filters) filterVals[f.key] = document.getElementById(f.id).value;
    const q = this.searchEl.value.trim().toLowerCase();
    let rows = this.records.filter(r => {
      for (const [k, v] of Object.entries(filterVals)) {
        if (v && String(r[k] ?? "") !== v) return false;
      }
      if (q) {
        const t = (r["视频标题"] || "") + " " + (r["作者名称"] || "");
        if (!t.toLowerCase().includes(q)) return false;
      }
      return true;
    });
    if (this.sortKey && this.sortDir) {
      const col = this.cols.find(c => c.key === this.sortKey);
      const numeric = col?.numeric;
      rows = rows.slice().sort((a, b) => {
        let va = a[this.sortKey], vb = b[this.sortKey];
        if (numeric) { va = Number(va) || 0; vb = Number(vb) || 0; }
        else { va = String(va ?? ""); vb = String(vb ?? ""); }
        if (va < vb) return this.sortDir === "asc" ? -1 : 1;
        if (va > vb) return this.sortDir === "asc" ? 1 : -1;
        return 0;
      });
    }
    return rows;
  }
  render() {
    const rows = this._currentRows();
    const tbody = this.table.querySelector("tbody");
    tbody.innerHTML = "";
    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${this.cols.length}" class="empty">无匹配数据</td></tr>`;
    } else {
      for (const r of rows) {
        const tr = document.createElement("tr");
        for (const c of this.cols) {
          const td = document.createElement("td");
          if (c.className) td.className = c.className;
          const val = r[c.key];
          if (c.render) td.innerHTML = c.render(val);
          else if (c.numeric) td.textContent = fmtNum(val);
          else td.textContent = val ?? "";
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
    }
    this.statEl.textContent = `当前显示 ${rows.length} / ${this.records.length} 行`;
  }
  exportExcel() {
    const rows = this._currentRows();
    const headers = this.cols.map(c => c.label);
    const data = [headers];
    for (const r of rows) {
      data.push(this.cols.map(c => r[c.key] ?? ""));
    }
    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "数据");
    const fname = `${this.exportName}_${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb, fname);
  }
}
